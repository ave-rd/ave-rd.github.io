# AVE-RD signature campaigns
# ---------------------------------------------------------------
# Two parallel campaigns. Each entry feeds a campaign page that
# renders an ask, a moderated signature wall, and a self-managed
# sign-up form.
#
# Submit channels (configured per campaign):
#   recipient_email     — primary mailto: target. The form opens the
#                          visitor's email client with all fields as
#                          the structured body.
#   github_issue_labels — comma-separated list applied to the
#                          pre-filled GitHub Issue when the visitor
#                          uses the secondary submit button.
#
# Moderation: the project team reads the email or issue, verifies
# the signatory, forwards to a Claude session, and Claude commits
# the verified entry into _data/signatures.yml.

site_recipient_email: "proyecto.ave.rd@gmail.com"
github_repo: "ave-rd/ave-rd.github.io"

campaigns:
  - id: continue-policy
    slug: "continue-the-policy"
    primary_lang: "es"
    flag: "🇩🇴"
    audience: "Dominican stakeholders"
    title_en: "Continue the AVE policy. Support the long-run evaluation."
    title_es: "Continuemos la política AVE. Apoyemos la evaluación a largo plazo."
    eyebrow_en: "Open letter · Dominican Republic"
    eyebrow_es: "Carta abierta · República Dominicana"
    recipient_en: "The Honourable Minister of Education and the leadership of MINERD"
    recipient_es: "Sr./Sra. Ministro/a de Educación y la dirección del MINERD"
    ask_en: >-
      The undersigned ask the Ministry of Education to (1) maintain
      the AVE intervention as standing policy in every public school
      in the country, and (2) support the 2025–2027 long-run
      follow-up evaluation that converts a documented short-term
      schooling effect into the first long-run earnings evidence on
      a video-based information campaign in Latin America.
    ask_es: >-
      Los abajo firmantes solicitamos al Ministerio de Educación
      (1) mantener la intervención AVE como política permanente en
      todas las escuelas públicas del país, y (2) apoyar la
      evaluación de seguimiento de largo plazo 2025–2027, que
      convierte un efecto escolar de corto plazo ya documentado en
      la primera evidencia de largo plazo sobre una campaña
      informativa basada en video en América Latina.
    why_en: >-
      AVE has reached every public school in the Dominican Republic
      and reduced dropout by 2.5–3 percentage points in the original
      pilot. The follow-up wave is what tells us whether the
      schooling effect compounds into earnings — and the country
      team that ran the 2015–2016 wave is the one running the
      follow-up. Continuity is the cheapest research input we have.
    why_es: >-
      AVE llega hoy a todas las escuelas públicas dominicanas y
      redujo la deserción en 2.5–3 puntos porcentuales en el piloto
      original. La ola de seguimiento es la que nos dice si el
      efecto escolar se traduce en ingresos — y el equipo del país
      que corrió la ola 2015–2016 es el mismo que corre el
      seguimiento. La continuidad es el insumo más barato que
      tenemos.
    github_issue_labels: "signature,continue-policy"
    page_order: 5

  - id: follow-up-pledge
    slug: "support-the-follow-up"
    primary_lang: "en"
    flag: "🌐"
    audience: "Funders and the international research community"
    title_en: "Endorse the AVE-RD long-run follow-up evaluation."
    title_es: "Avale la evaluación de seguimiento a largo plazo AVE-RD."
    eyebrow_en: "Pledge · 2025–2027"
    eyebrow_es: "Compromiso · 2025–2027"
    recipient_en: "Foundations, bilateral and multilateral funders, and the long-run-RCT research community"
    recipient_es: "Fundaciones, donantes bilaterales y multilaterales, y la comunidad de investigación en RCT de largo plazo"
    ask_en: >-
      Endorsers commit to (1) recognise the AVE-RD long-run follow-up
      as a priority replication of the Jensen 2010 information–schooling
      design, (2) support the 2025–2027 cohort re-survey and TSS
      earnings linkage, and (3) treat the open replication kit as a
      reusable benchmark for similar interventions in other countries.
    ask_es: >-
      Los firmantes se comprometen a (1) reconocer el seguimiento de
      largo plazo de AVE-RD como una replicación prioritaria del
      diseño Jensen 2010 sobre información y escolaridad, (2) apoyar
      la re-encuesta de cohorte 2025–2027 y la vinculación con la
      TSS, y (3) tratar el kit de replicación abierta como un
      referente reutilizable para intervenciones similares en otros
      países.
    why_en: >-
      AVE-RD's first wave moved the schooling decision; the follow-up
      tells us whether that decision moved lives. Endorsement helps
      foundations and bilateral funders see standing demand from the
      research community for long-run measurement of information
      interventions in education.
    why_es: >-
      La primera ola de AVE-RD movió la decisión escolar; el
      seguimiento nos dice si esa decisión movió vidas. El aval ayuda
      a las fundaciones y a los donantes bilaterales a observar la
      demanda existente de la comunidad investigadora por mediciones
      de largo plazo sobre intervenciones informativas en educación.
    github_issue_labels: "signature,follow-up-pledge"
    page_order: 6

