<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
<meta property="og:type" content="website" />
<meta property="og:url" content="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}" />
<meta property="og:image" content="{% if page.header-img %}{{ page.header-img | prepend: '/' | prepend: site.baseurl | prepend: site.url }}{% else %}{{ site.header-img | prepend: '/' | prepend: site.baseurl | prepend: site.url }}{% endif %}" />
<meta property="og:locale" content="{{ site.lang | default: 'en' }}_US" />
