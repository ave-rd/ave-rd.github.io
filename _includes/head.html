<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}

    <link rel='shortcut icon' type='image/png' href='{{ site.baseurl }}/favicon.png' />
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | prepend: site.baseurl | prepend: site.url }}" />

    <!-- Bootstrap 3 CSS (vendored, matches JS below) -->
    <link rel="stylesheet" href="{{ "/css/vendor/bootstrap.min.css" | prepend: site.baseurl | prepend: site.url }}">

    <!-- Vendored Newsreader + Instrument Sans (Iznik) -->
    <link rel="stylesheet" href="{{ "/assets/fonts/fonts.css" | prepend: site.baseurl | prepend: site.url }}">

    <!-- Site styles (compiled from _sass/) -->
    <link rel="stylesheet" href="{{ "/colorscheme.css" | prepend: site.baseurl | prepend: site.url }}">

    <!-- Code highlighter -->
    <link rel="stylesheet" href="{{ "/css/syntax.css" | prepend: site.baseurl | prepend: site.url }}">

    <!-- jQuery (vendored; required by Bootstrap 3 plugins) -->
    <script src="{{ "/js/vendor/jquery.min.js" | prepend: site.baseurl | prepend: site.url }}"></script>

    <!-- Bootstrap 3 JavaScript (vendored) -->
    <script src="{{ "/js/vendor/bootstrap.min.js" | prepend: site.baseurl | prepend: site.url }}"></script>

    <!-- Site JavaScript -->
    <script defer src="{{ "/js/site.js" | prepend: site.baseurl | prepend: site.url }}"></script>

    {% include analytics.html %}

</head>
