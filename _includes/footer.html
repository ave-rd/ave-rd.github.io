<!-- Footer -->
<footer role="contentinfo">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
                <ul class="footer-links">
                    <li><a href="{{ "/feed.xml" | prepend: site.baseurl }}">RSS feed</a></li>
                    {% if site.github_username %}
                    <li><a href="https://github.com/{{ site.github_username }}/{{ site.project_repository }}">Source on GitHub</a></li>
                    {% endif %}
                    {% if site.twitter_username %}
                    <li><a href="https://twitter.com/{{ site.twitter_username }}">Twitter</a></li>
                    {% endif %}
                    {% if site.facebook_username %}
                    <li><a href="https://www.facebook.com/{{ site.facebook_username }}">Facebook</a></li>
                    {% endif %}
                </ul>
                <p class="copyright">&copy; {{ site.time | date: '%Y' }} &middot; {{ site.title }}</p>
            </div>
        </div>
    </div>
</footer>
