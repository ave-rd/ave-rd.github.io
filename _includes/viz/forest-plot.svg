<svg viewBox="0 0 720 340" class="forest-plot" role="img" aria-labelledby="fp-title fp-desc" preserveAspectRatio="xMidYMid meet">
  <title id="fp-title">Forest plot of AVE-RD test-score effects</title>
  <desc id="fp-desc">Three rows of point estimates with 95% confidence intervals showing standardized test-score effects from AVE-RD: the informative arm, the twice-treated subsample, and the upper three deciles of baseline performance. All intervals exclude zero.</desc>

  <g class="forest-grid">
    <line x1="240" y1="50" x2="240" y2="270" />
    <line x1="340" y1="50" x2="340" y2="270" />
    <line x1="440" y1="50" x2="440" y2="270" />
    <line x1="540" y1="50" x2="540" y2="270" />
    <line x1="640" y1="50" x2="640" y2="270" />
  </g>

  <line class="forest-zero" x1="240" y1="50" x2="240" y2="270" />
  <line class="forest-axis" x1="240" y1="270" x2="640" y2="270" />

  <text class="forest-tick" x="240" y="290" text-anchor="middle">0</text>
  <text class="forest-tick" x="340" y="290" text-anchor="middle">0.05</text>
  <text class="forest-tick" x="440" y="290" text-anchor="middle">0.10</text>
  <text class="forest-tick" x="540" y="290" text-anchor="middle">0.15</text>
  <text class="forest-tick" x="640" y="290" text-anchor="middle">0.20</text>
  <text class="forest-tick" x="440" y="318" text-anchor="middle">Effect size (standard deviations · Pruebas Nacionales)</text>

  <!-- Row 1: Informative arm -->
  <text class="forest-label" x="225" y="100" text-anchor="end">Informative arm</text>
  <line class="forest-ci" x1="320" y1="100" x2="380" y2="100" />
  <circle class="forest-point" cx="350" cy="100" r="6" />
  <text class="forest-tick" x="395" y="103">0.055σ · 95% CI [0.04, 0.07]</text>

  <!-- Row 2: Twice-treated -->
  <text class="forest-label" x="225" y="160" text-anchor="end">Twice-treated</text>
  <line class="forest-ci" x1="380" y1="160" x2="500" y2="160" />
  <circle class="forest-point forest-point--ed" cx="440" cy="160" r="7" />
  <text class="forest-tick" x="515" y="163">0.10σ · 95% CI [0.07, 0.13]</text>

  <!-- Row 3: Top three deciles of baseline performance -->
  <text class="forest-label" x="225" y="220" text-anchor="end">Top 3 deciles</text>
  <line class="forest-ci" x1="360" y1="220" x2="520" y2="220" />
  <circle class="forest-point" cx="440" cy="220" r="6" />
  <text class="forest-tick" x="535" y="223">0.10σ · 95% CI [0.06, 0.14]</text>
</svg>
