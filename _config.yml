# Site settings
title: AVE-RD
description: "Learning the Value of Education in the Dominican Republic"
url: "https://ave-rd.github.io"
lang: en

# Header / branding
baseurl: ""
header-img: img/averd.jpg
headercolor: "#0099FF"
logo: /img/logos/logo_ave.jpg

# Repository (used by footer GitHub link)
github_username: ave-rd
project_repository: ave-rd.github.io

# Build settings
plugins: []
markdown: kramdown
highlighter: rouge
permalink: pretty

exclude:
  - README.md
  - LICENSE.md
  - vendor

defaults:
  - scope:
      path: "projects"
      type: "pages"
    values:
      layout: page
      header-img: img/averd.jpg
