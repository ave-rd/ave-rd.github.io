---
layout: default
---

<div class="container">
    <div class="row">
        <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">

            <header class="hero hero--gradient">
                <div class="hero__inner">
                    <div class="hero__eyebrow">
                        News &middot; {{ page.date | date: "%B %-d, %Y" }}{% if page.category %} &middot; {{ page.category }}{% endif %}
                    </div>
                    <h1 class="hero__title">{{ page.title }}</h1>
                    {% if page.description %}
                    <p class="hero__lede">{{ page.description }}</p>
                    {% endif %}
                </div>
            </header>

            {{ content }}

            <hr class="small" />

            <p style="text-align:center;margin-top:32px">
                <a class="partner-card__link" href="/news/">All news</a>
                &nbsp;&middot;&nbsp;
                <a class="partner-card__link" href="/feed.xml">Subscribe (RSS)</a>
                &nbsp;&middot;&nbsp;
                <a class="partner-card__link" href="/projects/follow-up/">Support the follow-up</a>
            </p>

            <script type="application/ld+json">
            {
              "@context": "https://schema.org",
              "@type": "NewsArticle",
              "headline": {{ page.title | jsonify }},
              "description": {{ page.description | jsonify }},
              "datePublished": "{{ page.date | date_to_xmlschema }}",
              "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
              "inLanguage": "{{ page.lang | default: site.lang | default: 'en' }}",
              "author": [
                {% if page.authors %}
                {% for a in page.authors %}{ "@type": "Person", "name": "{{ a }}" }{% unless forloop.last %},{% endunless %}{% endfor %}
                {% else %}
                { "@type": "Organization", "name": "{{ site.title }}" }
                {% endif %}
              ],
              "publisher": {
                "@type": "Organization",
                "name": "{{ site.title }}",
                "logo": {
                  "@type": "ImageObject",
                  "url": "{{ site.url }}{{ site.logo }}"
                }
              },
              "mainEntityOfPage": {
                "@type": "WebPage",
                "@id": "{{ site.url }}{{ page.url }}"
              },
              "isPartOf": {
                "@type": "ResearchProject",
                "@id": "{{ site.url }}/#project",
                "name": "AVE-RD"
              }
              {% if page.keywords %},
              "keywords": "{{ page.keywords | join: ', ' }}"
              {% endif %}
            }
            </script>

        </div>
    </div>
</div>
